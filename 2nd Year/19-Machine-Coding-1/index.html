<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comment Box</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        .container {
            border: 1px solid black;
            padding: 1rem;
            margin: 5rem;
        }

        .comment {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            position: relative;
            border-left: 1px solid #000;
            padding-left: 0.7rem;
        }

        .reply {
            width: 3rem;
        }

        textarea {
            width: 90%;
        }

        .hide {
            display: none;
        }
    </style>
</head>

<body>
    <div class="container">
    </div>
</body>

<script>
    let comments = JSON.parse(localStorage.getItem('comments')) || [
        {
            id: 1,
            title: "Hi, how are you doing?",
            replies: [
                {
                    id: 2,
                    title: "I'm good, thanks! How about you?",
                    replies: [
                        {
                            id: 3,
                            title: "Doing well, just busy with work.",
                            replies: []
                        }
                    ]
                },
                {
                    id: 4,
                    title: "Hey! Long time no see.",
                    replies: []
                }
            ]
        },
        {
            id: 5,
            title: "Hello everyone!",
            replies: []
        }
    ];

    const containerRef = document.querySelector('.container');

    const saveToLocalStorage = (comments) => {
        localStorage.setItem('comments', JSON.stringify(comments));
    }

    const removeFromLocalStorage = () => {
        localStorage.removeItem('comments');
    }

    const createCommentCard = (id, title, parentRef) => {

        const commentRef = document.createElement('div');
        commentRef.classList.add('comment');
        commentRef.setAttribute('id', id);

        commentRef.innerHTML = `
        <div class="title">${id}. ${title}</div>
        <button class="reply">Reply</button>
        <div class="new hide">
            <textarea placeholder="Enter your comment..."></textarea>
            <button class="send">Send</button>
        </div>
        `;

        const replyButtonRef = commentRef.querySelector('.reply');
        const replyRef = commentRef.querySelector('.new');
        const textareaRef = commentRef.querySelector('textarea');
        const sendButtonRef = commentRef.querySelector('.send');

        let content = '';

        replyButtonRef.addEventListener('click', e => {
            replyRef.classList.toggle('hide');
        })

        textareaRef.addEventListener('input', e => {
            content = e.target.value;
        })

        sendButtonRef.addEventListener('click', e => {
            updateComments(content, commentRef);
        })

        parentRef.appendChild(commentRef);
        return commentRef;
    }

    const updateComments = (content, commentRef) => {

        const replyId = Math.trunc(Math.random() * 1000);
        const replyTitle = content;

        const newComment = {
            id: replyId,
            title: replyTitle,
            replies: [

            ]
        }

        const id = commentRef.getAttribute('id');
        console.log(comments);
        findComment(comments, newComment, id);
        saveToLocalStorage(comments);
        loadComments();
    }

    const findComment = (comments, reply, id) => {

        console.log(comments);
        comments.forEach(comment => {

            if (comment.id == id) {
                comment.replies.unshift(reply);
                return;
            }

            else
                findComment(comment.replies, reply, id);
        })
    }

    const renderComments = (comments, parentRef) => {

        comments.forEach(comment => {
            const commentRef = createCommentCard(comment.id, comment.title, parentRef);

            if (comment.replies)
                renderComments(comment.replies, commentRef);
        })
    }

    const loadComments = () => {
        containerRef.innerHTML = '';
        renderComments(comments, containerRef);
    }

    loadComments();
</script>

</html>
