<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debouncing</title>
</head>

<body>
    <div class="container">
        <input type="text">
        <ul>
            <li>Item 1</li>
        </ul>
    </div>
</body>

<script>
    /* Debouncing -> Executes function only after a certain delay has passed since the last event
    Use cases of debouncing:
        1) Search Bar API Call
        2) Auto-save after typing stops
        3) Form validation
        4) Expensive calculation
    */
    const inputRef = document.querySelector('input');

    const debounce = (fn, delay) => {

        let timerId;

        return (...args) => {

            if (timerId)
                clearTimeout(timerId);

            timerId = setTimeout(() => {
                fn(...args);
            }, delay)
        }
    }

    const fetchProducts = async (value) => {
        const res = await fetch(`https://fakestoreapi.com/products?query=${value}`);
        const data = await res.json();
        console.log(data);
    }

    const debouncedFetchProducts = debounce(fetchProducts, 1000);

    inputRef.addEventListener('input', e => {
        // fetchProducts(e.target.value);
        debouncedFetchProducts(e.target.value);
    })
</script>

</html>
