<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Throttling</title>
    <style>
        html,
        body {
            height: 3000px;
        }

        .status {
            position: fixed;
            top: 0;
            left: 0;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            color: white;
        }
    </style>
</head>

<body>
    <div class="status">Scroll Position: <span id="scrollPosition">0</span></div>
</body>

<script>
    /* Throttling -> Ensures function runs at most once in a given interval
    Use cases of throttling:
        1) Scroll position tracking
        2) Analytics tracking
        3) Window re-sizing
        4) Mouse movement tracking
    */
    const scrollPositionRef = document.querySelector('#scrollPosition');

    const throttle = (fn, delay) => {
        let flag = true;

        return (...args) => {

            if (!flag)
                return;

            flag = false;

            setTimeout(() => {
                fn(...args);
                flag = true;
            }, delay)
        }
    }

    const updateScrollPosition = () => {
        scrollPositionRef.innerText = window.scrollY;
    }

    const trackMousePosition = () => {
        console.log("Tracking mouse position");
    }

    const throttleUpdateScrollPosition = throttle(updateScrollPosition, 2000);
    const throttleTrackMousePosition = throttle(trackMousePosition, 1000);

    document.addEventListener('scroll', throttleUpdateScrollPosition);
    document.addEventListener('mousemove', throttleTrackMousePosition);
</script>

</html>
