<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Throttling</title>
    <style>
        html,
        body {
            height: 3000px;
        }

        .status {
            position: fixed;
            top: 0;
            left: 0;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            color: white;
        }
    </style>
</head>

<body>
    <div class="status">Scroll Position: <span id="scrollPosition">0</span></div>
</body>

<script>
    const scrollPositionRef = document.querySelector('#scrollPosition');

    const updateScrollPosition = () => {
        scrollPositionRef.innerText = window.scrollY;
    }

    document.addEventListener('scroll', updateScrollPosition);
</script>

</html>
